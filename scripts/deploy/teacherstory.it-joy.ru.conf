# teacherstory.it-joy.ru — nginx config
# Location: /etc/nginx/conf.d/teacherstory.it-joy.ru.conf

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name teacherstory.it-joy.ru;
    return 301 https://$host$request_uri;
}

# --- HTTPS (via stream proxy_protocol on :8444) ---
server {
    server_name teacherstory.it-joy.ru;

    http2 on;

    # SSL — через stream-фронт :443 → :8444 proxy_protocol
    listen 127.0.0.1:8444 ssl proxy_protocol;
    ssl_certificate     /etc/letsencrypt/live/teacherstory.it-joy.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teacherstory.it-joy.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Real IP from proxy_protocol
    set_real_ip_from 127.0.0.1;
    real_ip_header proxy_protocol;

    # SPA root — Vite build output
    root /var/www/teacherstory.it-joy.ru/front/dist;
    index app.html;

    # API → Bun backend
    location /api/ {
        proxy_pass http://127.0.0.1:33001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    # Auth routes → Bun backend
    location ~ ^/(auth)(/|$) {
        proxy_pass http://127.0.0.1:33001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all other routes
    location / {
        try_files $uri $uri/ /app.html;
    }

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Upload limit (photos)
    client_max_body_size 50M;
}
