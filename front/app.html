<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <!-- Theme bootstrap: applies .dark class BEFORE CSS loads to prevent flash -->
    <script>
      (function () {
        try {
          var m = localStorage.getItem('ts_theme_mode');
          if (!m) m = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          if (m === 'dark') document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeacherStory — Фотопортфолио учителя</title>
    <meta name="description" content="Хронологическое фотопортфолио учителя. Более 30 лет педагогического стажа, выпуски, школьные события, яркие моменты." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TeacherStory — Фотопортфолио учителя" />
    <meta property="og:description" content="Хронологическое фотопортфолио учителя. Более 30 лет педагогического стажа." />
    <meta property="og:locale" content="ru_RU" />

    <!-- Fonts — Onest self-hosted (see index.css @font-face) -->

    <style>
      html.dark {
        background-color: #1a1916;
        color-scheme: dark;
      }
      html.dark body {
        background-color: #1a1916;
      }
      html:not(.dark) {
        background-color: #faf8f5;
        color-scheme: light;
      }
      html:not(.dark) body {
        background-color: #faf8f5;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      body {
        margin: 0;
        font-family: 'Onest', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="max-width:800px;margin:40px auto;padding:0 20px;font-family:sans-serif;color:#333">
        <h1>TeacherStory — Фотопортфолио учителя</h1>
        <p>Хронологическое фотопортфолио с историей более 30 лет педагогического стажа.</p>
        <p>Для работы необходимо включить JavaScript.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
